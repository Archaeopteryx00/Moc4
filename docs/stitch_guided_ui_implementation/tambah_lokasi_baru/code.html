<script>
        // Simple Interaction logic
        const dropzone = document.getElementById('image-dropzone');
        const preview = document.getElementById('preview-img');
        const labels = dropzone.querySelector('div');

        dropzone.addEventListener('click', () => {
            // Simulated upload behavior
            preview.classList.toggle('hidden');
            labels.classList.toggle('hidden');
        });

        const categoryButtons = document.querySelectorAll('.flex-wrap button:not(:last-child)');
        categoryButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                categoryButtons.forEach(b => {
                    b.className = "px-4 py-2 rounded-full bg-surface-container-high text-on-surface text-label-md hover:bg-surface-container-highest transition-all scale-98 active:scale-95";
                });
                btn.className = "px-4 py-2 rounded-full bg-primary text-white text-label-md transition-all scale-98 active:scale-95";
            });
        });
