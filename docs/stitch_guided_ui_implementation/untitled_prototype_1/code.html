<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        @keyframes fade-in-up {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes subtle-pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.95; }
        }

        .animate-fade-in-up {
            animation: fade-in-up 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .animate-logo-float {
            animation: subtle-pulse 3s ease-in-out infinite;
        }

        .gradient-mesh {
            background-color: #fcf9f8;
            background-image: 
                radial-gradient(at 0% 0%, rgba(183, 0, 26, 0.03) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(183, 0, 26, 0.02) 0px, transparent 50%);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#b7001a",
                        "on-primary-fixed-variant": "#930012",
                        "tertiary": "#595a5b",
                        "surface-container": "#f0edec",
                        "on-surface-variant": "#5e3f3c",
                        "on-primary-container": "#fff7f6",
                        "secondary": "#5e5e5d",
                        "overlay-scrim": "rgba(0, 0, 0, 0.4)",
                        "primary-container": "#e60023",
                        "on-secondary-container": "#626361",
                        "secondary-fixed": "#e3e2e0",
                        "inverse-surface": "#313030",
                        "on-background": "#1c1b1b",
                        "surface-container-high": "#ebe7e7",
                        "on-secondary": "#ffffff",
                        "secondary-fixed-dim": "#c7c6c5",
                        "on-primary-fixed": "#410004",
                        "tertiary-fixed-dim": "#c6c6c7",
                        "tertiary-container": "#717373",
                        "on-tertiary-container": "#f9f9f9",
                        "inverse-on-surface": "#f3f0ef",
                        "surface-tint": "#c0001b",
                        "error": "#ba1a1a",
                        "border-subtle": "#EEEEEE",
                        "error-container": "#ffdad6",
                        "background": "#fcf9f8",
                        "on-secondary-fixed": "#1a1c1b",
                        "secondary-container": "#e0dfde",
                        "primary-fixed": "#ffdad7",
                        "on-tertiary-fixed": "#1a1c1c",
                        "outline-variant": "#e8bcb8",
                        "surface-container-lowest": "#ffffff",
                        "surface-dim": "#dcd9d9",
                        "on-secondary-fixed-variant": "#464746",
                        "text-muted": "#5F5F5F",
                        "inverse-primary": "#ffb3ad",
                        "tertiary-fixed": "#e2e2e2",
                        "on-tertiary": "#ffffff",
                        "primary-fixed-dim": "#ffb3ad",
                        "on-surface": "#1c1b1b",
                        "on-error": "#ffffff",
                        "surface-warm": "#FAF9F7",
                        "outline": "#936e6b",
                        "surface-container-highest": "#e5e2e1",
                        "surface": "#fcf9f8",
                        "surface-container-low": "#f6f3f2",
                        "on-tertiary-fixed-variant": "#454747",
                        "on-error-container": "#93000a",
                        "surface-bright": "#fcf9f8",
                        "surface-variant": "#e5e2e1",
                        "on-primary": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-md": "12px",
                        "gutter": "12px",
                        "section-gap": "32px",
                        "margin-mobile": "16px",
                        "stack-sm": "4px",
                        "stack-lg": "24px",
                        "margin-tablet": "24px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "headline-xl": ["Plus Jakarta Sans"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "label-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "headline-xl": ["30px", {"lineHeight": "38px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-lg": ["24px", {"lineHeight": "30px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "600"}],
                        "label-sm": ["11px", {"lineHeight": "14px", "fontWeight": "500"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-md": ["20px", {"lineHeight": "26px", "fontWeight": "600"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body-md text-on-surface">
<!-- Splash Screen Wrapper -->
<main class="relative h-screen w-full flex flex-col items-center justify-center gradient-mesh overflow-hidden">
<!-- Abstract Background Element for Texture -->
<div class="absolute inset-0 pointer-events-none opacity-20">
<div class="absolute top-[-10%] right-[-10%] w-[400px] h-[400px] rounded-full bg-primary-fixed blur-[100px]"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-[300px] h-[300px] rounded-full bg-surface-container-high blur-[80px]"></div>
</div>
<!-- Logo Container -->
<div class="relative z-10 flex flex-col items-center gap-stack-lg">
<!-- Stylized Brand Icon -->
<div class="animate-logo-float">
<div class="w-24 h-24 bg-primary rounded-full flex items-center justify-center shadow-[0_8px_32px_rgba(183,0,26,0.15)] relative">
<!-- Stylized Spoon/Hidden Detail Icon -->
<span class="material-symbols-outlined text-on-primary !text-[48px]" data-icon="restaurant_menu">restaurant_menu</span>
<!-- Small Hidden Element Marker -->
<div class="absolute bottom-5 right-5 w-3 h-3 bg-white rounded-full border-2 border-primary"></div>
</div>
</div>
<!-- Brand Name -->
<div class="text-center animate-fade-in-up" style="animation-delay: 0.2s;">
<h1 class="font-headline-xl text-headline-xl text-primary tracking-tight">
                    Hidden Bites
                </h1>
<p class="font-label-md text-label-md text-text-muted mt-2 tracking-widest uppercase opacity-70">
                    Urban Explorer's Guide
                </p>
</div>
</div>
<!-- Loading / Progress Indicator (Subtle) -->
<div class="absolute bottom-16 w-full px-margin-mobile flex flex-col items-center gap-4 animate-fade-in-up" style="animation-delay: 0.5s;">
<div class="h-[2px] w-32 bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-primary w-0 transition-all duration-[3000ms] ease-out" id="progress-bar"></div>
</div>
<span class="font-label-sm text-label-sm text-on-surface-variant/60">Discovering secret flavors...</span>
</div>
<!-- Atmospheric Imagery Overlay (Very Subtle Glass Card) -->
<div class="absolute bottom-0 left-0 w-full h-1/4 bg-gradient-to-t from-surface via-surface/80 to-transparent pointer-events-none"></div>
</main>
<!-- Micro-interaction Script -->
<script>
        window.addEventListener('DOMContentLoaded', () => {
            // Simulate progress bar
            const progressBar = document.getElementById('progress-bar');
            setTimeout(() => {
                progressBar.style.width = '100%';
            }, 100);

            // Optional: Subtle parallax or mouse movement effect for larger screens
            document.addEventListener('mousemove', (e) => {
                const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
                const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
                const logo = document.querySelector('.animate-logo-float');
                if (logo) {
                    logo.style.transform = `translate(${moveX}px, ${moveY}px)`;
                }
            });
        });
    </script>
</body></html>
