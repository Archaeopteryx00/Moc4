<script>
        // Simple micro-interaction for the save buttons
        document.querySelectorAll('.absolute.top-2.right-2').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const icon = btn.querySelector('.material-symbols-outlined');
                const isFilled = icon.style.fontVariationSettings.includes("'FILL' 1");
                icon.style.fontVariationSettings = isFilled ? "'FILL' 0" : "'FILL' 1";
                
                // Add a small bounce effect
                btn.classList.add('scale-125');
                setTimeout(() => btn.classList.remove('scale-125'), 200);
            });
        });
    </script>
