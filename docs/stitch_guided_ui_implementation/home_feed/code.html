<script>
        // Simple micro-interaction for heart icons
        document.querySelectorAll('button .material-symbols-outlined[data-icon="favorite"]').forEach(heart => {
            heart.parentElement.addEventListener('click', function(e) {
                e.preventDefault();
                const isFilled = heart.style.fontVariationSettings.includes("'FILL' 1");
                if (isFilled) {
                    heart.style.fontVariationSettings = "'FILL' 0";
                    heart.parentElement.classList.remove('text-primary-container');
                    heart.parentElement.classList.add('text-white');
                    heart.parentElement.classList.add('bg-white/20');
                    heart.parentElement.classList.remove('bg-white/80');
                } else {
                    heart.style.fontVariationSettings = "'FILL' 1";
                    heart.parentElement.classList.add('text-primary-container');
                    heart.parentElement.classList.remove('text-white');
                    heart.parentElement.classList.remove('bg-white/20');
                    heart.parentElement.classList.add('bg-white/80');
                }
            });
        });

        // Category pill selection logic
        const pills = document.querySelectorAll('button.font-label-md');
        pills.forEach(pill => {
            pill.addEventListener('click', () => {
                pills.forEach(p => {
                    p.classList.remove('active-pill');
                    p.classList.add('bg-surface-container-lowest', 'text-secondary', 'border-border-subtle');
                });
                pill.classList.add('active-pill');
                pill.classList.remove('bg-surface-container-lowest', 'text-secondary', 'border-border-subtle');
            });
        });
    </script>
