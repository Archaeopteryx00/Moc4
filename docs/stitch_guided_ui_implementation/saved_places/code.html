<script>
        // Simple Interaction for Chips
        const chips = document.querySelectorAll('section button');
        chips.forEach(chip => {
            chip.addEventListener('click', () => {
                chips.forEach(c => c.classList.remove('active-pill', 'bg-surface-container-low', 'text-text-muted'));
                chips.forEach(c => {
                    if (c !== chip) {
                        c.classList.add('bg-surface-container-low', 'text-text-muted');
                    }
                });
                chip.classList.add('active-pill');
                chip.classList.remove('bg-surface-container-low', 'text-text-muted');
            });
        });

        // Simple scale effect for cards on touch
        const cards = document.querySelectorAll('.masonry-grid > div');
        cards.forEach(card => {
            card.addEventListener('touchstart', () => {
                card.style.transform = 'scale(0.98)';
                card.style.transition = 'transform 0.2s ease';
            });
            card.addEventListener('touchend', () => {
                card.style.transform = 'scale(1)';
            });
        });
    </script>
