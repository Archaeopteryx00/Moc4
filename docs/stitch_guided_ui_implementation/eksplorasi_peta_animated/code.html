<style>

        /* Animations */
        @keyframes slide-down {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes slide-up-bounce {
            0% { transform: translateY(120%); opacity: 0; }
            60% { transform: translateY(-10%); opacity: 1; }
            100% { transform: translateY(0); opacity: 1; }
        }
        @keyframes pop-in {
            0% { transform: scale(0); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0px); }
        }
        @keyframes pulse-select {
            0% { box-shadow: 0 0 0 0 rgba(183, 0, 26, 0.4); transform: scale(1.1); }
            70% { box-shadow: 0 0 0 10px rgba(183, 0, 26, 0); transform: scale(1.15); }
            100% { box-shadow: 0 0 0 0 rgba(183, 0, 26, 0); transform: scale(1.1); }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        @keyframes slow-pan {
            0% { transform: scale(1.1) translate(0, 0); }
            50% { transform: scale(1.1) translate(-1%, -1%); }
            100% { transform: scale(1.1) translate(0, 0); }
        }

        .animate-slide-down { animation: slide-down 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-slide-up-bounce { animation: slide-up-bounce 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        .animate-pop-in { animation: pop-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; opacity: 0; }
        .animate-float { animation: float 3s ease-in-out infinite; }
        .animate-slow-pan { animation: slow-pan 40s ease-in-out infinite; }
        
        .marker-selected .marker-icon {
            animation: pulse-select 1.5s infinite;
            background-color: theme('colors.primary') !important;
            color: white !important;
        }

            background: linear-gradient(90deg, #f0f0f0 25%, #f8f8f8 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

<!-- Interaction Script -->
<script>
        function selectMarker(element, id) {
            // Update marker styles
            document.querySelectorAll('.group').forEach(m => {
                m.classList.remove('marker-selected');
                // Ensure default marker icon state
                const icon = m.querySelector('.marker-icon');
                if (icon) {
                    icon.classList.remove('bg-primary', 'text-white');
                    icon.classList.add('bg-white', 'text-primary');
                }
            });
            
            element.classList.add('marker-selected');
            const activeIcon = element.querySelector('.marker-icon');
            if (activeIcon) {
                activeIcon.classList.remove('bg-white', 'text-primary');
                activeIcon.classList.add('bg-primary', 'text-white');
            }

            // Animate card
            const card = document.getElementById('preview-card');
            card.style.animation = 'none';
            card.offsetHeight; // trigger reflow
            card.style.animation = 'slide-up-bounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards';
        }
    </script>
