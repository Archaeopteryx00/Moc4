<script>
        // Micro-interactions for the preview card
        const card = document.querySelector('.absolute.bottom-\\[80px\\]');
        let startY;
        
        card.addEventListener('touchstart', (e) => {
            startY = e.touches[0].clientY;
        });

        card.addEventListener('touchend', (e) => {
            const endY = e.changedTouches[0].clientY;
            if (startY - endY > 50) {
                // Potential "expand" gesture
                card.style.transform = 'translateY(-10px)';
                setTimeout(() => card.style.transform = 'translateY(0)', 300);
            }
        });

        // Simple marker click simulation
        const markers = document.querySelectorAll('.absolute.z-0 > div');
        markers.forEach(marker => {
            marker.addEventListener('click', () => {
                marker.classList.add('scale-125');
                setTimeout(() => marker.classList.remove('scale-125'), 200);
            });
        });
    </script>
