<script>
        // Subtle scroll behavior for header
        let lastScroll = 0;
        const header = document.getElementById('main-header');

        window.addEventListener('scroll', () => {
            const currentScroll = window.pageYOffset;
            if (currentScroll <= 0) {
                header.classList.remove('shadow-sm');
                return;
            }
            if (currentScroll > lastScroll) {
                // Scroll Down
                header.style.transform = 'translateY(-100%)';
            } else {
                // Scroll Up
                header.style.transform = 'translateY(0)';
                header.classList.add('shadow-sm');
            }
            lastScroll = currentScroll;
        });

        // Add micro-interaction for chips
        const chips = document.querySelectorAll('button.rounded-full');
        chips.forEach(chip => {
            chip.addEventListener('click', function() {
                if (this.classList.contains('bg-primary')) return;
                
                // Toggle active state (simplified for demo)
                chips.forEach(c => {
                    c.classList.remove('bg-primary', 'text-on-primary');
                    c.classList.add('bg-surface-container', 'text-text-muted');
                });
                this.classList.remove('bg-surface-container', 'text-text-muted');
                this.classList.add('bg-primary', 'text-on-primary');
            });
        });

        // Masonry simulation with scale entrance
        const cards = document.querySelectorAll('.masonry-grid > div');
        cards.forEach((card, index) => {
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            setTimeout(() => {
                card.style.transition = 'all 0.6s cubic-bezier(0.23, 1, 0.32, 1)';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, index * 100);
        });
    </script>
