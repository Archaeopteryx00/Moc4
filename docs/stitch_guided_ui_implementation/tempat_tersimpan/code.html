<script>
        // Simple Interaction logic
        document.querySelectorAll('.masonry-grid > div').forEach(card => {
            card.addEventListener('click', () => {

                console.log('Navigating to spot details...');
            });
        });

        // Bookmark toggle simulation
        document.querySelectorAll('.glass-overlay').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const icon = btn.querySelector('.material-symbols-outlined');
                const isFilled = icon.style.fontVariationSettings.includes("'FILL' 1");
                
                if (isFilled) {
                    icon.style.fontVariationSettings = "'FILL' 0";
                    btn.classList.remove('text-primary');
                    btn.classList.add('text-secondary');
                } else {
                    icon.style.fontVariationSettings = "'FILL' 1";
                    btn.classList.add('text-primary');
                    btn.classList.remove('text-secondary');
                }
            });
        });
    </script>
